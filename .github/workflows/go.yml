# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USER: postgres
      DB_PASS: postgres
      DB_ADDR: localhost
      DB_PORT: 5432
      DB_NAME: test_db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Format
        run: |
          fmt_out=$(gofmt -l backend/)
          if [ -n "$fmt_out" ]; then
            echo "The following files are not formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Create tables (test schema)
        run: |
          psql postgres://postgres:postgres@localhost:5432/test_db <<'EOF'
          CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            email TEXT UNIQUE,
            password_hash TEXT
          );

          CREATE TABLE IF NOT EXISTS profiles (
            id SERIAL PRIMARY KEY,
            user_id INT REFERENCES users(id),
            first_name TEXT,
            last_name TEXT,
            phone TEXT,
            city TEXT,
            state TEXT,
            country TEXT,
            linkedin_url TEXT,
            portfolio_url TEXT,
            summary TEXT,
            completion_percent INT DEFAULT 0
          );

          CREATE TABLE IF NOT EXISTS jobs (
            id SERIAL PRIMARY KEY,
            user_id INT,
            company_name TEXT,
            title TEXT,
            location_text TEXT,
            salary INT,
            status TEXT,
            deadline_date TIMESTAMP,
            description TEXT,
            created_at TIMESTAMP DEFAULT NOW(),
            updated_at TIMESTAMP DEFAULT NOW()
          );
          EOF

      - name: Build
        run: go -C backend/ build -v

      - name: Test
        run: go -C backend/ test ./db -v
