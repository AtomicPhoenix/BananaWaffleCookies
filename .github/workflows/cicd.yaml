name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Frontend Tests
  node-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node-version: [ 22.x ]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Clean Install 
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test 
        run: npm run test

  # Postgres Tests
  db-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USER: postgres
      DB_PASS: postgres
      DB_ADDR: localhost
      DB_PORT: 5432
      DB_NAME: test_db

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run DB schema
        env:
          PGPASSWORD: postgres
        run: |
          psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -v ON_ERROR_STOP=1 \
            -f schemas/db_up.sql

      - name: Run DB seed schema
        env:
          PGPASSWORD: postgres
        run: |
          psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -v ON_ERROR_STOP=1 \
            -f schemas/db_seed.sql

      - name: Run DB down schema
        env:
          PGPASSWORD: postgres
        run: |
          psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -v ON_ERROR_STOP=1 \
            -f schemas/db_down.sql

  # Backend Tests
  go-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USER: postgres
      DB_PASS: postgres
      DB_ADDR: localhost
      DB_PORT: 5432
      DB_NAME: test_db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Format
        run: |
          fmt_out=$(gofmt -l backend/)
          if [ -n "$fmt_out" ]; then
            echo "The following files are not formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U postgres && break
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run DB schema
        env:
          PGPASSWORD: postgres
        run: |
          psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -v ON_ERROR_STOP=1 \
            -f schemas/db_up.sql

      - name: Build
        run: go -C backend/ build -v

      - name: Test DB
        run: go -C backend/ test ./db -v

      - name: Test Handlers
        run: go -C backend/ test ./handlers -v

  # Deploy build to server IF all tests pass
  deploy:
    runs-on: ubuntu-latest

    needs: [go-tests, node-tests, db-tests]

    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH Deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/BananaWaffleCookies
            source .env
            git pull origin main
            systemctl restart bwc-server
            psql -U $DB_USER -d $DB_NAME -f schemas/db_down.sql
            psql -U $DB_USER -d $DB_NAME -f schemas/db_up.sql
            psql -U $DB_USER -d $DB_NAME -f schemas/db_seed.sql
